<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <style>
        :root {
            --bg-0: #05070d;
            --bg-1: #0a0f1d;
            --bg-2: #111827;
            --accent: #f3c969;
            --accent-2: #6ad7ff;
            --text: #f2f4f8;
            --muted: #a9b0c2;
            --panel: rgba(9, 13, 24, 0.72);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 70% -10%, rgba(106, 215, 255, 0.18), transparent 60%),
                radial-gradient(800px 500px at 10% 110%, rgba(243, 201, 105, 0.14), transparent 60%),
                linear-gradient(140deg, var(--bg-0), var(--bg-1) 40%, var(--bg-2));
            font-family: "Rajdhani", "Trebuchet MS", sans-serif;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            inset: -10% -10%;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.9), transparent 60%),
                radial-gradient(1.5px 1.5px at 80% 20%, rgba(255, 255, 255, 0.8), transparent 60%),
                radial-gradient(1px 1px at 40% 70%, rgba(255, 255, 255, 0.7), transparent 60%),
                radial-gradient(2px 2px at 65% 55%, rgba(255, 255, 255, 0.6), transparent 60%),
                radial-gradient(1px 1px at 15% 80%, rgba(255, 255, 255, 0.6), transparent 60%);
            opacity: 0.7;
            animation: drift 24s linear infinite;
            z-index: 0;
        }

        body::after {
            opacity: 0.35;
            filter: blur(0.6px);
            animation-duration: 36s;
        }

        .screen {
            position: relative;
            z-index: 1;
            padding: clamp(24px, 6vw, 56px);
            width: min(460px, 90vw);
        }

        .title {
            font-family: "Orbitron", "Rajdhani", sans-serif;
            font-size: clamp(26px, 4.2vw, 40px);
            letter-spacing: 0.08em;
            margin: 0 0 20px;
            text-transform: uppercase;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 10px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 10px 14px 10px 6px;
            border-left: 3px solid transparent;
            position: relative;
            transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, text-shadow 0.18s ease;
        }

        .menu a::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 12px;
            bottom: 6px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(243, 201, 105, 0.7), transparent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.18s ease;
        }

        .menu a:hover,
        .menu a:focus-visible {
            color: var(--accent);
            border-color: var(--accent);
            transform: translateX(8px) skewX(-6deg);
            text-shadow: 0 0 16px rgba(243, 201, 105, 0.6);
        }

        .menu a:hover::after,
        .menu a:focus-visible::after {
            transform: scaleX(1);
        }

        .menu a:focus-visible {
            outline: 2px solid rgba(243, 201, 105, 0.6);
            outline-offset: 4px;
        }

        dialog {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            background: rgba(7, 10, 20, 0.95);
            color: var(--text);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            width: min(420px, 92vw);
        }

        dialog::backdrop {
            background: rgba(4, 6, 12, 0.7);
            backdrop-filter: blur(2px);
        }

        .dialog-title {
            margin: 0 0 12px;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dialog-row {
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
        }

        .dialog-row label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .dialog-row input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(10, 18, 38, 0.7);
            color: var(--text);
            font-family: "Rajdhani", "Trebuchet MS", sans-serif;
            letter-spacing: 0.05em;
        }

        .dialog-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .dialog-actions button {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(16, 24, 44, 0.8);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }

        .dialog-actions button:hover,
        .dialog-actions button:focus-visible {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .glow {
            position: absolute;
            right: -160px;
            top: 35%;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(106, 215, 255, 0.18), transparent 65%);
            filter: blur(2px);
            opacity: 0.7;
            z-index: 0;
        }

        @keyframes drift {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(40px);
            }
        }

        @media (max-width: 600px) {
            .screen {
                width: 100%;
                margin: 20px;
            }

            .menu a {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="glow" aria-hidden="true"></div>
        <h1 class="title">Space Explorer</h1>
        <nav aria-label="Main menu">
            <ul class="menu">
                <li><a href="space.html">Start Mission</a></li>
                <li><a href="#" id="options-button">Options</a></li>
                <li><a href="#" id="exit-button">Exit</a></li>
            </ul>
        </nav>
    </main>
    <dialog id="options-dialog">
        <form method="dialog">
            <h2 class="dialog-title">Options</h2>
            <div class="dialog-row">
                <label for="seed-input">Seed</label>
                <input id="seed-input" name="seed" type="text" inputmode="numeric" autocomplete="off" />
            </div>
            <div class="dialog-actions">
                <button type="button" id="seed-save">Set Seed</button>
                <button type="button" id="seed-random">Randomize</button>
                <button type="button" id="seed-clear">Clear</button>
                <button type="submit">Close</button>
            </div>
        </form>
    </dialog>
    <script>
        const seedCookieName = "space_seed";
        const optionsButton = document.getElementById("options-button");
        const optionsDialog = document.getElementById("options-dialog");
        const seedInput = document.getElementById("seed-input");
        const seedSave = document.getElementById("seed-save");
        const seedRandom = document.getElementById("seed-random");
        const seedClear = document.getElementById("seed-clear");
        const exitButton = document.getElementById("exit-button");

        const getCookie = (name) => {
            const cookies = document.cookie.split(";").map((cookie) => cookie.trim());
            const match = cookies.find((cookie) => cookie.startsWith(`${name}=`));
            return match ? decodeURIComponent(match.split("=")[1]) : "";
        };

        const setCookie = (name, value, days = 365) => {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
        };

        const clearCookie = (name) => {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
        };

        const openOptions = () => {
            seedInput.value = getCookie(seedCookieName);
            optionsDialog.showModal();
        };

        optionsButton.addEventListener("click", (event) => {
            event.preventDefault();
            openOptions();
        });

        seedSave.addEventListener("click", () => {
            const value = seedInput.value.trim();
            if (value) {
                setCookie(seedCookieName, value);
            }
        });

        seedRandom.addEventListener("click", () => {
            const value = Math.floor(Math.random() * 1_000_000_000).toString();
            seedInput.value = value;
            setCookie(seedCookieName, value);
        });

        seedClear.addEventListener("click", () => {
            seedInput.value = "";
            clearCookie(seedCookieName);
        });

        exitButton.addEventListener("click", (event) => {
            event.preventDefault();
            window.close();
        });
    </script>
</body>
</html>
