<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Viewer</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        #id-display {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
        }
        #points-display {
            position: absolute;
            top: 52px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
        }
        #timer-display {
            position: absolute;
            top: 94px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
        }
        #controls-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 100;
        }
        #takeoff-button {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }
        #takeoff-button:hover,
        #takeoff-button:focus-visible {
            transform: translateY(-2px);
            border-color: white;
            color: white;
        }
    </style>
</head>
<body>
    <div id="id-display">ID: Loading...</div>
    <div id="points-display">Points: 0</div>
    <div id="timer-display">Time: 05:00</div>
    <button id="takeoff-button" type="button">Takeoff</button>
    <div id="controls-info">WASD: Move | Mouse: Look | Click: Lock Pointer | SPACE: Jump</div>
    
    <a-scene background="color: #000011">
        <!-- Assets for ground texture -->
        <a-assets>
            <canvas id="groundTexture" width="1024" height="1024"></canvas>
        </a-assets>
        
        <!-- Skybox -->
        <a-sky color="#000011"></a-sky>

        <!-- Terrain entity (will be generated via JavaScript) -->
        <a-entity id="terrain" position="0 0 0"></a-entity>

        <!-- Coins container -->
        <a-entity id="coins"></a-entity>

        <!-- Camera rig for player control -->
        <a-entity id="camera-rig" position="0 1.6 0">
            <a-entity 
                id="camera"
                camera 
                look-controls="pointerLockEnabled: true"
                position="0 0 0">
            </a-entity>
        </a-entity>

        <!-- Lighting -->
        <a-light type="directional" color="#fff" intensity="1" position="5 10 7"></a-light>
        <a-light type="ambient" color="#fff" intensity="0.4"></a-light>
    </a-scene>

    <script>
        const pointsCookieName = "space_points";
        const coinsCookieName = "space_coins";
        const timerCookieName = "space_timer_start";
        const timerDurationMs = 5 * 60 * 1000;

        const getCookie = (name) => {
            const cookies = document.cookie.split(";").map((cookie) => cookie.trim());
            const match = cookies.find((cookie) => cookie.startsWith(`${name}=`));
            return match ? decodeURIComponent(match.split("=")[1]) : "";
        };

        const setCookie = (name, value, days = 365) => {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
        };

        const getPoints = () => {
            const value = Number(getCookie(pointsCookieName));
            return Number.isFinite(value) ? value : 0;
        };

        const setPoints = (value) => {
            setCookie(pointsCookieName, String(Math.max(0, Math.floor(value))));
            updatePointsDisplay();
        };

        const updatePointsDisplay = () => {
            const display = document.getElementById("points-display");
            display.textContent = `Points: ${getPoints()}`;
        };

        const getTimerStart = () => {
            const value = Number(getCookie(timerCookieName));
            if (Number.isFinite(value) && value > 0) {
                return value;
            }
            const now = Date.now();
            setCookie(timerCookieName, String(now));
            return now;
        };

        const getRemainingMs = () => {
            const elapsed = Date.now() - getTimerStart();
            return Math.max(0, timerDurationMs - elapsed);
        };

        const formatTime = (ms) => {
            const totalSeconds = Math.ceil(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${String(seconds).padStart(2, "0")}`;
        };

        const updateTimerDisplay = () => {
            const display = document.getElementById("timer-display");
            display.textContent = `Time: ${formatTime(getRemainingMs())}`;
        };

        const checkTimer = () => {
            const remaining = getRemainingMs();
            updateTimerDisplay();
            if (remaining <= 0) {
                window.location.href = "gameover.html";
            }
        };

        const getCoinState = () => {
            const raw = getCookie(coinsCookieName);
            if (!raw) {
                return {};
            }
            try {
                return JSON.parse(raw);
            } catch (error) {
                return {};
            }
        };

        const setCoinState = (state) => {
            setCookie(coinsCookieName, JSON.stringify(state));
        };

        const generateCoinId = () => {
            return `coin_${Math.random().toString(36).slice(2, 10)}_${Date.now()}`;
        };

        // Get the ID from query string
        const urlParams = new URLSearchParams(window.location.search);
        const planetId = urlParams.get('id') || 'No ID provided';
        const planetKey = planetId === 'No ID provided' ? 'unknown' : planetId;
        
        // Display the ID
        document.getElementById('id-display').textContent = 'ID: ' + planetId;
        updatePointsDisplay();
        checkTimer();
        setInterval(checkTimer, 500);
        document.getElementById('takeoff-button').addEventListener('click', () => {
            window.location.href = 'space.html';
        });
        
        // Generate procedural ground texture
        function generateGroundTexture(seed) {
            const canvas = document.getElementById('groundTexture');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            
            // Seed the random number generator
            let random = (() => {
                let x = Math.sin(seed) * 10000;
                return () => {
                    x = Math.sin(x) * 10000;
                    return x - Math.floor(x);
                };
            })();
            
            // Generate Perlin-like noise using simple layered noise
            for (let i = 0; i < width * height; i++) {
                const x = i % width;
                const y = Math.floor(i / width);
                
                // Multiple octaves of noise
                let value = 0;
                let amplitude = 1;
                let frequency = 1;
                let maxValue = 0;
                
                for (let octave = 0; octave < 4; octave++) {
                    const sampleX = (x / width) * frequency;
                    const sampleY = (y / height) * frequency;
                    
                    // Simple noise function
                    const noise = Math.sin(sampleX * 12.9898 + sampleY * 78.233 + seed) * 43758.5453;
                    value += (noise - Math.floor(noise)) * amplitude;
                    
                    maxValue += amplitude;
                    amplitude *= 0.5;
                    frequency *= 2;
                }
                
                value = (value / maxValue) * 255;
                
                // Add some variation for dirt/grass appearance
                const variation = Math.sin((x * 7 + y * 13) * 0.1 + seed) * 30 + 30;
                value = Math.max(0, Math.min(255, value + variation));
                
                // Create grayscale + brown tones
                const r = Math.floor(value * 0.7 + 40);
                const g = Math.floor(value * 0.65 + 35);
                const b = Math.floor(value * 0.4 + 20);
                
                const pixelIndex = i * 4;
                data[pixelIndex] = r;
                data[pixelIndex + 1] = g;
                data[pixelIndex + 2] = b;
                data[pixelIndex + 3] = 255;
            }
            
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }
        
        // Generate seed from ID
        let idSeed = 0;
        if (planetId !== 'No ID provided') {
            for (let i = 0; i < planetId.length; i++) {
                idSeed += planetId.charCodeAt(i) * (i + 1);
            }
        } else {
            idSeed = Math.random() * 10000;
        }
        
        generateGroundTexture(idSeed);
        
        // Player movement and physics
        const player = {
            velocity: { x: 0, y: 0, z: 0 },
            isGrounded: false,
            jumpPower: 10,
            gravity: -30,
            speed: 0.1
        };
        
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            space: false
        };
        
        const cameraRig = document.getElementById('camera-rig');
        const camera = document.getElementById('camera');
        const terrain = document.getElementById('terrain');
        const coinsContainer = document.getElementById('coins');
        const activeCoins = [];
        const coinPickupRadius = 2.8;
        let audioContext = null;

        const playPickupSound = () => {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.type = "triangle";
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.001, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.2, audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.15);
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.16);
        };
        
        // Function to generate heightmap
        function getHeight(x, z, seed) {
            let value = 0;
            let amplitude = 1;
            let frequency = 1;
            let maxValue = 0;
            
            for (let octave = 0; octave < 5; octave++) {
                const sampleX = x * frequency * 0.01;
                const sampleZ = z * frequency * 0.01;
                
                const noise = Math.sin(sampleX * 12.9898 + sampleZ * 78.233 + seed) * 43758.5453;
                value += (noise - Math.floor(noise)) * amplitude;
                
                maxValue += amplitude;
                amplitude *= 0.5;
                frequency *= 2;
            }
            
            value = (value / maxValue);
            return (value - 0.5) * 80; // Scale to -40 to 40 units
        }
        
        // Raycast downward to find terrain collision
        function getTerrainHeightRaycast(x, z, seed) {
            // Sample multiple points in a small area to smooth out noise
            const sampleDistance = 0.5;
            const samples = [];
            
            for (let dx = -sampleDistance; dx <= sampleDistance; dx += sampleDistance) {
                for (let dz = -sampleDistance; dz <= sampleDistance; dz += sampleDistance) {
                    samples.push(getHeight(x + dx, z + dz, seed));
                }
            }
            
            // Return average for smooth, stable collision
            return samples.reduce((a, b) => a + b, 0) / samples.length;
        }
        
        // Generate terrain mesh
        function createTerrainMesh(seed, groundColor) {
            const geometry = new THREE.PlaneGeometry(10000, 10000, 200, 200);
            geometry.rotateX(-Math.PI / 2);
            
            const positionAttribute = geometry.getAttribute('position');
            for (let i = 0; i < positionAttribute.count; i++) {
                const x = positionAttribute.getX(i);
                const z = positionAttribute.getZ(i);
                const height = getHeight(x, z, seed);
                positionAttribute.setY(i, height);
            }
            positionAttribute.needsUpdate = true;
            geometry.computeVertexNormals();
            
            const material = new THREE.MeshPhongMaterial({
                map: new THREE.CanvasTexture(document.getElementById('groundTexture')),
                color: new THREE.Color(groundColor),
                side: THREE.DoubleSide
            });
            material.map.magFilter = THREE.NearestFilter;
            material.map.minFilter = THREE.NearestFilter;
            material.map.repeat.set(300, 300);
            
            const mesh = new THREE.Mesh(geometry, material);
            return mesh;
        }

        function ensurePlanetCoins(seed) {
            const state = getCoinState();
            if (!state[planetKey]) {
                const coinCount = 8;
                const coinRange = 160;
                const positions = [];

                for (let i = 0; i < coinCount; i++) {
                    const x = (Math.random() * 2 - 1) * coinRange;
                    const z = (Math.random() * 2 - 1) * coinRange;
                    const y = getTerrainHeightRaycast(x, z, seed) + 1.2;
                    positions.push({
                        id: generateCoinId(),
                        x: Number(x.toFixed(2)),
                        y: Number(y.toFixed(2)),
                        z: Number(z.toFixed(2))
                    });
                }

                state[planetKey] = {
                    positions,
                    collected: []
                };
                setCoinState(state);
            }

            return state[planetKey];
        }

        function spawnCoins(coinData) {
            coinsContainer.innerHTML = "";
            activeCoins.length = 0;
            const collected = new Set(coinData.collected || []);

            for (const coin of coinData.positions || []) {
                if (collected.has(coin.id)) {
                    continue;
                }

                const entity = document.createElement('a-torus');
                entity.setAttribute('radius', 0.7);
                entity.setAttribute('radius-tubular', 0.15);
                entity.setAttribute('position', `${coin.x} ${coin.y} ${coin.z}`);
                entity.setAttribute('rotation', '90 0 0');
                entity.setAttribute('material', 'color: #ffd34d; emissive: #ffea9a; emissiveIntensity: 0.6');
                entity.setAttribute('animation', 'property: rotation; to: 90 360 0; dur: 2000; loop: true; easing: linear');
                coinsContainer.appendChild(entity);
                activeCoins.push({ id: coin.id, x: coin.x, y: coin.y, z: coin.z, entity });
            }
        }
        
        // Optional: Use the ID to generate scene properties
        if (planetId !== 'No ID provided') {
            // Generate a hash-based color scheme from the ID
            let hash = 0;
            for (let i = 0; i < planetId.length; i++) {
                const char = planetId.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            // Generate muted earth-tone colors based on hash
            const hue = Math.abs(hash) % 360;
            // Use muted saturation (25-45%) and mid-range lightness (35-55%) for earth tones
            const saturation = 25 + (Math.abs(hash) % 20); // 25-45%
            const lightness = 35 + (Math.abs(hash >> 8) % 20); // 35-55%
            const groundColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            
            // Create and add terrain mesh
            const terrainMesh = createTerrainMesh(idSeed, groundColor);
            
            // Wait for scene to load before adding mesh
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener('loaded', () => {
                terrain.setObject3D('mesh', terrainMesh);
            });
            
            // Generate gravity based on ID (range from -10 to -50)
            const gravityRange = 40; // Range of gravity values
            const gravityMin = -50;
            const gravityValue = gravityMin + (Math.abs(hash >> 16) % gravityRange);
            player.gravity = gravityValue;
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 'a') keys.a = true;
            if (key === 's') keys.s = true;
            if (key === 'd') keys.d = true;
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 'a') keys.a = false;
            if (key === 's') keys.s = false;
            if (key === 'd') keys.d = false;
            if (key === ' ') keys.space = false;
        });
        
        // Generate default terrain if no ID
        if (planetId === 'No ID provided') {
            const defaultColor = 'hsl(30, 35%, 40%)';
            const terrainMesh = createTerrainMesh(idSeed, defaultColor);
            
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener('loaded', () => {
                terrain.setObject3D('mesh', terrainMesh);
            });
        }
        
        // Animation loop for gravity and movement
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
            let lastTime = Date.now();
            const coinData = ensurePlanetCoins(idSeed);
            spawnCoins(coinData);
            
            const updatePlayer = () => {
                const currentTime = Date.now();
                const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.05);
                lastTime = currentTime;
                
                // Get camera direction for movement
                const cameraDirection = new THREE.Vector3();
                const camera3d = camera.getObject3D('camera');
                camera3d.getWorldDirection(cameraDirection);
                cameraDirection.y = 0; // Keep movement horizontal
                cameraDirection.normalize();
                
                // Right vector
                const rightVector = new THREE.Vector3();
                rightVector.crossVectors(cameraDirection, new THREE.Vector3(0, 1, 0)).normalize();
                
                // WASD movement
                const moveDirection = new THREE.Vector3(0, 0, 0);
                if (keys.w) moveDirection.add(cameraDirection);
                if (keys.s) moveDirection.sub(cameraDirection);
                if (keys.d) moveDirection.add(rightVector);
                if (keys.a) moveDirection.sub(rightVector);
                
                if (moveDirection.length() > 0) {
                    moveDirection.normalize();
                    moveDirection.multiplyScalar(player.speed);
                }
                
                // Apply horizontal velocity
                player.velocity.x = moveDirection.x;
                player.velocity.z = moveDirection.z;
                
                // Update position
                const currentPos = cameraRig.getAttribute('position');
                
                // Apply horizontal movement first
                let newX = currentPos.x + player.velocity.x;
                let newZ = currentPos.z + player.velocity.z;
                let newY = currentPos.y;

                // Apply gravity
                player.velocity.y += player.gravity * deltaTime;
                newY += player.velocity.y * deltaTime;

                // Get stable terrain height using raycasting
                const terrainHeightAtNewPos = getTerrainHeightRaycast(newX, newZ, idSeed);
                const standingHeight = terrainHeightAtNewPos + 1.6;
                
                const collisionDistance = 0.3; // Hysteresis: only collide if moving downward into terrain

                // Check for collision with terrain
                if (newY < standingHeight && player.velocity.y <= 0) {
                    // Only snap to terrain when moving downward
                    newY = standingHeight;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                } else if (newY < standingHeight - collisionDistance) {
                    // Emergency collision prevention for edge cases
                    newY = standingHeight;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                } else {
                    player.isGrounded = false;
                }
                
                // Jump
                if (keys.space && player.isGrounded) {
                    player.velocity.y = player.jumpPower;
                    player.isGrounded = false;
                }
                
                const newPos = {
                    x: newX,
                    y: newY,
                    z: newZ
                };
                
                cameraRig.setAttribute('position', newPos);

                // Coin pickup
                if (activeCoins.length > 0) {
                    const state = getCoinState();
                    const planetState = state[planetKey];
                    const collected = new Set(planetState.collected || []);
                    const remaining = [];

                    for (const coin of activeCoins) {
                        const dx = newX - coin.x;
                        const dy = newY - coin.y;
                        const dz = newZ - coin.z;
                        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (distance < coinPickupRadius && !collected.has(coin.id)) {
                            collected.add(coin.id);
                            if (coin.entity && coin.entity.parentNode) {
                                coin.entity.parentNode.removeChild(coin.entity);
                            }
                            setPoints(getPoints() + 1);
                            playPickupSound();
                        } else {
                            remaining.push(coin);
                        }
                    }

                    activeCoins.length = 0;
                    activeCoins.push(...remaining);
                    planetState.collected = Array.from(collected);
                    state[planetKey] = planetState;
                    setCoinState(state);
                }

                requestAnimationFrame(updatePlayer);
            };
            
            updatePlayer();
        });
    </script>
</body>
</html>
